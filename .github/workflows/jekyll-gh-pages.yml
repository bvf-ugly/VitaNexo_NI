name: Build and deploy web to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug repo & detect prebuilt site
        run: |
          echo "Repo root listing:"
          ls -la || true
          echo "Listing docs/web, web/:"
          ls -la docs/web || true
          ls -la web || true
          echo "Listing web/dist and web/build:"
          ls -la web/dist || true
          ls -la web/build || true

      - name: Decide publish directory (docs/web > web/dist > web/build > build)
        id: decide
        run: |
          if [ -d ./docs/web ]; then
            echo "PUBLISH_DIR=./docs/web" >> $GITHUB_ENV
            echo "USE_BUILD=false" >> $GITHUB_ENV
            echo "Using existing ./docs/web as publish dir"
          elif [ -d ./web/dist ]; then
            echo "PUBLISH_DIR=./web/dist" >> $GITHUB_ENV
            echo "USE_BUILD=false" >> $GITHUB_ENV
            echo "Using existing ./web/dist as publish dir"
          elif [ -d ./web/build ]; then
            echo "PUBLISH_DIR=./web/build" >> $GITHUB_ENV
            echo "USE_BUILD=false" >> $GITHUB_ENV
            echo "Using existing ./web/build as publish dir"
          else
            echo "PUBLISH_DIR=./web/dist" >> $GITHUB_ENV
            echo "USE_BUILD=true" >> $GITHUB_ENV
            echo "No prebuilt output found; workflow will build the site into ./web/dist"
          fi

      - name: Set up Node.js 18 (only if build needed)
        if: env.USE_BUILD == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies and build (web) (only if build needed)
        if: env.USE_BUILD == 'true'
        working-directory: ./web
        run: |
          set -e
          echo "PWD=$(pwd)"
          if [ -f ../pnpm-lock.yaml ] || [ -f pnpm-lock.yaml ]; then
            corepack enable
            corepack prepare pnpm@latest --activate
            pnpm install
            pnpm build
          elif [ -f package-lock.json ] || [ -f ../package-lock.json ]; then
            npm ci
            npm run build
          else
            npm install
            npm run build
          fi

      - name: Validate publish dir
        run: |
          if [ -z "${PUBLISH_DIR}" ]; then
            echo "PUBLISH_DIR not set, exiting"
            exit 1
          fi
          if [ ! -d "${PUBLISH_DIR}" ]; then
            echo "ERROR: publish dir ${PUBLISH_DIR} does not exist"
            ls -la || true
            exit 1
          fi
          echo "Publish dir OK: ${PUBLISH_DIR}"
          ls -la "${PUBLISH_DIR}" || true

      - name: Prevent Jekyll in publish dir
        run: |
          touch "${PUBLISH_DIR}/.nojekyll"
          echo ".nojekyll created in ${PUBLISH_DIR}"

      - name: Deploy to gh-pages via peaceiris
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.PUBLISH_DIR }}
          publish_branch: gh-pages
          keep_files: false
