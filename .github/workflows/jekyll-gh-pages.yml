name: Build and deploy web (React/Vite) to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies and build (web)
        working-directory: ./web
        run: |
          set -e
          echo "PWD=$(pwd)"
          # Prefer pnpm if pnpm-lock exists in repo root or web/
          if [ -f ../pnpm-lock.yaml ] || [ -f pnpm-lock.yaml ]; then
            corepack enable
            corepack prepare pnpm@latest --activate
            pnpm install
            pnpm build
          elif [ -f package-lock.json ] || [ -f ../package-lock.json ]; then
            npm ci
            npm run build
          else
            npm install
            npm run build
          fi

      - name: Debug build output and source check
        run: |
          echo "Listing web/src/pages (fuente):"
          ls -la web/src/pages || true
          echo "Listing web/:"
          ls -la web || true
          echo "Listing possible build outputs:"
          ls -la web/dist || true
          ls -la web/build || true

      - name: Ensure build output exists and disable Jekyll
        run: |
          # Comprobación sencilla: no salimos aquí, la detección se hace más abajo
          touch ./web/.build_check || true
          # add .nojekyll later to chosen publish dir

      - name: Determine publish directory (dist vs build)
        run: |
          if [ -d ./web/dist ]; then
            echo "Using ./web/dist as publish dir"
            echo "PUBLISH_DIR=./web/dist" >> $GITHUB_ENV
          elif [ -d ./web/build ]; then
            echo "Using ./web/build as publish dir"
            echo "PUBLISH_DIR=./web/build" >> $GITHUB_ENV
          else
            echo "ERROR: No build output found in ./web/dist or ./web/build"
            ls -la web || true
            exit 1
          fi

      - name: Prevent Jekyll in publish dir
        run: |
          if [ -z "${PUBLISH_DIR}" ]; then
            echo "PUBLISH_DIR not set"
            exit 1
          fi
          touch "${PUBLISH_DIR}/.nojekyll"
          echo "Contents of publish dir:"
          ls -la "${PUBLISH_DIR}" || true

      - name: Deploy to gh-pages via peaceiris
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.PUBLISH_DIR }}
          publish_branch: gh-pages
          keep_files: false
          # opcional: establecer user si se desea
          # user_name: "github-actions[bot]"
          # user_email: "github-actions[bot]@users.noreply.github.com"
