name: Build and deploy web (Vite) to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies and build (web)
        working-directory: ./web
        run: |
          set -e
          echo "PWD=$(pwd)"
          # Prefer pnpm if pnpm-lock exists in repo root or web/
          if [ -f ../pnpm-lock.yaml ] || [ -f pnpm-lock.yaml ]; then
            corepack enable
            corepack prepare pnpm@latest --activate
            pnpm install
            pnpm build
          elif [ -f package-lock.json ] || [ -f ../package-lock.json ]; then
            npm ci
            npm run build
          else
            npm install
            npm run build
          fi

      - name: Debug build output
        run: |
          echo "Listing web/:"
          ls -la web || true
          echo "Listing web/dist (expected build output):"
          ls -la web/dist || true

      - name: Ensure build output exists and disable Jekyll
        run: |
          if [ ! -d ./web/dist ]; then
            echo "ERROR: web/dist not found. Build failed or output path differs."
            ls -la web || true
            exit 1
          fi
          # Prevent GitHub Pages from running Jekyll on the artifact
          touch ./web/dist/.nojekyll

      - name: Deploy to gh-pages via peaceiris
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
          publish_branch: gh-pages
          keep_files: false
          # opcional: establezca commit user si lo desea
          # user_name: "github-actions[bot]"
          # user_email: "github-actions[bot]@users.noreply.github.com"
