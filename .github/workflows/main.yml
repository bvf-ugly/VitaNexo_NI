name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    concurrency:
      group: pages-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies and build
        working-directory: ./web
        run: |
          set -e
          echo "PWD=$(pwd)"
          # Detect pnpm lockfile either in web or repository root
          if [ -f ../pnpm-lock.yaml ] || [ -f pnpm-lock.yaml ]; then
            corepack enable
            corepack prepare pnpm@latest --activate
            pnpm install
            pnpm build
          elif [ -f package-lock.json ] || [ -f ../package-lock.json ]; then
            npm ci
            npm run build
          else
            npm install
            npm run build
          fi

      - name: Debug build output
        run: |
          echo "Contents of web/:"
          ls -la web || true
          echo "Contents of web/dist (build output):"
          ls -la web/dist || true

      - name: Ensure output exists and disable Jekyll
        run: |
          if [ -d ./web/dist ]; then
            echo "Build output found at web/dist"
          else
            echo "ERROR: Build did not produce web/dist — aborting."
            ls -la web || true
            exit 1
          fi
          # Prevent GitHub Pages from processing files with Jekyll
          touch ./web/dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v3

      - name: Upload Pages artifact
        # Use upload-artifact@v4 directly and name the artifact `pages`
        uses: actions/upload-artifact@v4
        with:
          name: pages
          path: ./web/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
``` ````

Qué cambié y por qué
- Cambio: el paso "Upload Pages artifact" ahora usa actions/upload-artifact@v4 con name: pages en lugar de actions/upload-pages-artifact@v1.
- Motivo: el error en los logs mostró que una acción dependía de upload-artifact@v3 (deprecated) y GitHub bloquea esas descargas. upload-artifact@v4 es la versión no deprecada; subir el artefacto nombrado "pages" permite que actions/deploy-pages@v1 lo detecte y proceda al despliegue.

Alternativa (si prefieres mantener upload-pages-artifact acción remota)
- Si existe una versión más reciente de actions/upload-pages-artifact (por ejemplo @v2) que ya haya actualizado su dependencia, puedes preferir actualizar a esa versión. Ejemplo:
  uses: actions/upload-pages-artifact@v2
  with:
    path: ./web/dist
- Si no existe, la solución mostrada arriba es la más directa.

Cómo aplicar el cambio (opciones)

Opción A — Editar desde la web (rápido)
1. Ve a https://github.com/bvf-ugly/VitaNexo_NI/blob/main/.github/workflows/main.yml
2. Click en el lápiz (Edit file).
3. Reemplaza el contenido por el bloque YAML anterior.
4. Commit changes (elige "Create a new branch for this commit and start a pull request" si prefieres revisar antes).

Opción B — Usando git (CLI)
git clone https://github.com/bvf-ugly/VitaNexo_NI.git
cd VitaNexo_NI
git checkout -b fix/pages-upload-artifact
# reemplaza el archivo .github/workflows/main.yml con el contenido anterior (usa tu editor)
git add .github/workflows/main.yml
git commit -m "fix(pages): use upload-artifact@v4 to avoid deprecated upload-artifact v3 dependency"
git push origin fix/pages-upload-artifact
# luego crea PR y merge a main o merge directamente si tienes permisos.

Verificación
- Re-run the workflow (push or manual run).
- En los logs, la sección "Getting action download info" no debería fallar con el error de artefacto deprecado.
- Si aparece algún error adicional, pega aquí los nuevos logs y lo reviso.

