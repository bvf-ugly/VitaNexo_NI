<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2a4a"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="50%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>
  <!-- Animated pulse line -->
  <polyline fill="none" stroke="url(#line)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <animate attributeName="points" dur="2s" repeatCount="indefinite"
      values="
        50,160 120,160 140,160 150,80 160,160 180,160 200,160 220,160 240,160 260,160 280,160 300,160 320,160 340,160 360,160 380,160 400,160 420,160 440,160 460,160 480,160 500,160 520,160 540,160 560,160 580,160 600,160 620,160 640,160 660,160 680,160 700,160 750,160;
        50,160 120,160 140,160 150,60 160,160 180,160 200,160 220,160 240,160 260,160 280,160 300,160 320,160 340,160 360,160 380,160 400,160 420,160 440,160 460,160 480,160 500,160 520,160 540,160 560,160 580,160 600,160 620,160 640,160 660,160 680,160 700,160 750,160;
        50,160 120,160 140,160 150,80 160,160 180,160 200,160 220,160 240,160 260,160 280,160 300,160 320,160 340,160 360,160 380,160 400,160 420,160 440,160 460,160 480,160 500,160 520,160 540,160 560,160 580,160 600,160 620,160 640,160 660,160 680,160 700,160 750,160
      "/>
    <animate attributeName="opacity" dur="2s" repeatCount="indefinite"
      values="0.6;1;0.6"/>
  </polyline>
  <!-- Grid lines -->
  <line x1="50" y1="60" x2="750" y2="60" stroke="#1a3a5a" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="50" y1="110" x2="750" y2="110" stroke="#1a3a5a" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="50" y1="160" x2="750" y2="160" stroke="#1a3a5a" stroke-width="0.5"/>
  <!-- Title -->
  <text x="50" y="45" fill="#00d4aa" font-family="monospace" font-size="28" font-weight="bold">VitaNexo</text>
  <text x="50" y="70" fill="#5a7a9a" font-family="monospace" font-size="12">
    <tspan>Plataforma medica multiplataforma</tspan>
  </text>
  <text x="50" y="90" fill="#3a5a7a" font-family="monospace" font-size="11">
    <tspan>Node.js / MongoDB / React / Expo</tspan>
  </text>
  <!-- Status dots -->
  <circle cx="700" cy="40" r="4" fill="#00d4aa">
    <animate attributeName="opacity" dur="1.5s" repeatCount="indefinite" values="1;0.3;1"/>
  </circle>
  <text x="710" y="44" fill="#5a7a9a" font-family="monospace" font-size="10">running</text>
</svg>
